<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>B4U Deals</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:#08090d;min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;overflow:hidden}
.bg{position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(99,102,241,0.2) 0%,transparent 70%)}
.card{position:relative;z-index:1;width:100%;max-width:360px;padding:0 24px}
.logo{text-align:center;margin-bottom:40px}
.logo-icon{width:72px;height:72px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:22px;display:inline-flex;align-items:center;justify-content:center;font-size:32px;margin-bottom:16px;box-shadow:0 20px 40px rgba(99,102,241,0.3)}
h1{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:#fff;letter-spacing:-0.5px}
p{color:rgba(255,255,255,0.35);font-size:13px;margin-top:6px}
.field{margin-bottom:16px}
input[type=password]{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:16px 18px;color:#fff;font-size:16px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s;-webkit-appearance:none}
input[type=password]:focus{border-color:rgba(99,102,241,0.6)}
button{width:100%;padding:16px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:14px;color:#fff;font-family:'Syne',sans-serif;font-size:16px;font-weight:700;cursor:pointer;letter-spacing:0.2px;-webkit-appearance:none}
.error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);color:#fca5a5;padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:16px;text-align:center}
</style>
</head>
<body>
<div class="bg"></div>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🎯</div>
    <h1>B4U Deals</h1>
    <p>Panneau d'administration</p>
  </div>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="POST">
    <div class="field">
      <input type="password" name="password" placeholder="Mot de passe" required autofocus autocomplete="current-password">
    </div>
    <button type="submit">Connexion</button>
  </form>
</div>
</body>
</html>
